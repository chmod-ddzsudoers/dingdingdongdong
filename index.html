<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dingdonglove</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      cursor: pointer;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    #hint {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: rgba(255,255,255,0.88);
      font-size: 14px;
      letter-spacing: 1px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(6px);
      pointer-events: none;
      white-space: nowrap;
    }

    #status {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      letter-spacing: 0.5px;
      pointer-events: none;
      text-align: center;
      min-width: 180px;
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <div id="hint">按下：随机换字并聚合　|　松开：散开</div>
  <div id="status">正在加载文案…</div>
  <div id="canvas-container"></div>

  <script>
    // =========================
    // 可调参数
    // =========================
    const CONFIG = {
      particleCount: 8000,     // 粒子数量，越大越清楚，越吃性能
      sampleStep: 2,           // 文字采样步长，越小越密，越清楚
      pointSize: 0.1,         // 单个粒子大小
      pointOpacity: 0.86,      // 粒子透明度
      rotationSpeed: 0.01,    // 整体旋转速度
      gatherEase: 0.05,        // 聚合进度缓动
      moveEase: 0.10,          // 每个粒子移动缓动
      randomRangeX: 100,
      randomRangeY: 60,
      randomRangeZ: 50,
      textScale: 0.04,         // 文字坐标缩放
      canvasWidth: 1600,
      canvasHeight: 900
    };

    // =========================
    // 基础 DOM
    // =========================
    const container = document.getElementById("canvas-container");
    const statusEl = document.getElementById("status");

    function setStatus(text) {
      statusEl.textContent = text;
    }

    // =========================
    // Three.js 初始化
    // =========================
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      75,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.z = 38;

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: true
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    // =========================
    // 粒子数据
    // =========================
    const particleCount = CONFIG.particleCount;
    const geometry = new THREE.BufferGeometry();

    const positions = new Float32Array(particleCount * 3);
    const targetPositions = new Float32Array(particleCount * 3);
    const randomPositions = new Float32Array(particleCount * 3);

    const material = new THREE.PointsMaterial({
      color: 0xff69b4,
      size: CONFIG.pointSize,
      transparent: true,
      opacity: CONFIG.pointOpacity,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    // =========================
    // 文案数据
    // =========================
    let TEXT_GROUPS = [];
    let currentGroupIndex = -1;
    let isAppStarted = false;

    async function loadTextGroups() {
      try {
        const response = await fetch("./texts.json");

        if (!response.ok) {
          throw new Error(`加载 texts.json 失败：${response.status}`);
        }

        const data = await response.json();

        const validGroups = data
          .filter(group => Array.isArray(group))
          .map(group =>
            group
              .filter(line => typeof line === "string")
              .map(line => line.trim())
              .filter(line => line.length > 0)
          )
          .filter(group => group.length > 0);

        if (validGroups.length === 0) {
          throw new Error("texts.json 中没有可用文案");
        }

        TEXT_GROUPS = validGroups;
       setStatus(`已加载 ${TEXT_GROUPS.length} 组文案`);
      } catch (error) {
        console.error(error);

        TEXT_GROUPS = [
          ["加载失败"],
          ["请检查", "texts.json"],
          ["文案文件未找到", "或格式不正确"]
        ];

        setStatus("文案加载失败，已使用兜底文案");
      }
    }

    function getRandomTextGroup() {
      if (TEXT_GROUPS.length === 0) return ["暂无文案"];
      if (TEXT_GROUPS.length === 1) return TEXT_GROUPS[0];

      let nextIndex;
      do {
        nextIndex = Math.floor(Math.random() * TEXT_GROUPS.length);
      } while (nextIndex === currentGroupIndex);

      currentGroupIndex = nextIndex;
      return TEXT_GROUPS[nextIndex];
    }

    // =========================
    // 文字转粒子点
    // =========================
    function getLayoutForLines(lineCount) {
      // 1/2/3 行分别优化；超过 3 行也会继续缩小并整体居中
      if (lineCount <= 1) {
        return { fontSize: 100, lineHeight: 120 };
      }
      if (lineCount === 2) {
        return { fontSize: 100, lineHeight: 120 };
      }
      if (lineCount === 3) {
        return { fontSize: 100, lineHeight: 120 };
      }

      // 4 行及以上，继续缩小
      const fontSize = Math.max(70, 115 - (lineCount - 3) * 10);
      const lineHeight = Math.max(95, 140 - (lineCount - 3) * 8);
      return { fontSize, lineHeight };
    }

    function getTextPoints(lines) {
      const canvas = document.createElement("canvas");
      canvas.width = CONFIG.canvasWidth;
      canvas.height = CONFIG.canvasHeight;

      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      const { fontSize, lineHeight } = getLayoutForLines(lines.length);

      ctx.font = `600 ${fontSize}px "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif`;

      // 把所有行当作一个整体做垂直居中
      const totalHeight = (lines.length - 1) * lineHeight;
      const startY = canvas.height / 2 - totalHeight / 2;

      lines.forEach((line, i) => {
        const y = startY + i * lineHeight;
        ctx.fillText(line, canvas.width / 2, y);
      });

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
      const points = [];
      const step = CONFIG.sampleStep;

      for (let y = 0; y < canvas.height; y += step) {
        for (let x = 0; x < canvas.width; x += step) {
          const index = (y * canvas.width + x) * 4;
          const alpha = imageData[index + 3];

          if (alpha > 128) {
            const px = (x - canvas.width / 2) * CONFIG.textScale;
            const py = (canvas.height / 2 - y) * CONFIG.textScale;
            points.push({ x: px, y: py });
          }
        }
      }

      return points;
    }

    function updateTargetText(lines) {
      const textPoints = getTextPoints(lines);

      if (!textPoints.length) return;

      for (let i = 0; i < particleCount; i++) {
        const p = textPoints[Math.floor(Math.random() * textPoints.length)];
        const idx = i * 3;

        targetPositions[idx] = p.x;
        targetPositions[idx + 1] = p.y;
        targetPositions[idx + 2] = 0; // 聚合时不发散，字更清楚
      }
    }

    function initParticles() {
      const initialLines = getRandomTextGroup();
      const initialPoints = getTextPoints(initialLines);

      for (let i = 0; i < particleCount; i++) {
        const idx = i * 3;
        const p = initialPoints[Math.floor(Math.random() * initialPoints.length)];

        targetPositions[idx] = p.x;
        targetPositions[idx + 1] = p.y;
        targetPositions[idx + 2] = 0;

        randomPositions[idx] = (Math.random() - 0.5) * CONFIG.randomRangeX;
        randomPositions[idx + 1] = (Math.random() - 0.5) * CONFIG.randomRangeY;
        randomPositions[idx + 2] = (Math.random() - 0.5) * CONFIG.randomRangeZ;

        positions[idx] = randomPositions[idx];
        positions[idx + 1] = randomPositions[idx + 1];
        positions[idx + 2] = randomPositions[idx + 2];
      }

      geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
    }

    // =========================
    // 交互逻辑
    // =========================
    let gatherFactor = 0;
    let targetGatherFactor = 0;
    let isPressing = false;

    function pressStart() {
      if (!isAppStarted) return;

      if (!isPressing) {
        isPressing = true;
        const nextLines = getRandomTextGroup();
        updateTargetText(nextLines);
      }

      targetGatherFactor = 1;
    }

    function pressEnd() {
      if (!isAppStarted) return;
      isPressing = false;
      targetGatherFactor = 0;
    }

    window.addEventListener("mousedown", pressStart);
    window.addEventListener("mouseup", pressEnd);
    window.addEventListener("mouseleave", pressEnd);

    window.addEventListener("touchstart", pressStart, { passive: true });
    window.addEventListener("touchend", pressEnd, { passive: true });
    window.addEventListener("touchcancel", pressEnd, { passive: true });

    // =========================
    // 动画
    // =========================
    function animate() {
      requestAnimationFrame(animate);

      // particles.rotation.y += CONFIG.rotationSpeed;
    
      const time = performance.now() * 0.001;
      
      particles.rotation.y = Math.sin(time * 1.0) * 0.50;
      particles.rotation.x = Math.sin(time * 0.5) * 0.08;

      gatherFactor += (targetGatherFactor - gatherFactor) * CONFIG.gatherEase;

      const posAttr = particles.geometry.attributes.position;
      const arr = posAttr.array;

      for (let i = 0; i < particleCount; i++) {
        const idx = i * 3;

        const tx = randomPositions[idx] + (targetPositions[idx] - randomPositions[idx]) * gatherFactor;
        const ty = randomPositions[idx + 1] + (targetPositions[idx + 1] - randomPositions[idx + 1]) * gatherFactor;
        const tz = randomPositions[idx + 2] + (targetPositions[idx + 2] - randomPositions[idx + 2]) * gatherFactor;

        arr[idx] += (tx - arr[idx]) * CONFIG.moveEase;
        arr[idx + 1] += (ty - arr[idx + 1]) * CONFIG.moveEase;
        arr[idx + 2] += (tz - arr[idx + 2]) * CONFIG.moveEase;
      }

      posAttr.needsUpdate = true;
      renderer.render(scene, camera);
    }

    // =========================
    // 自适应
    // =========================
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    // =========================
    // 启动
    // =========================
    async function startApp() {
      await loadTextGroups();
      initParticles();
      isAppStarted = true;
      animate();
    }

    startApp();
  </script>
</body>
</html>
