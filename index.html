<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>按下聚合为发光图片</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      font-family: Arial, "Microsoft YaHei", sans-serif;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    #hint {
      position: fixed;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: rgba(255,255,255,0.92);
      font-size: 15px;
      letter-spacing: 1px;
      text-align: center;
      line-height: 1.8;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(6px);
      pointer-events: none;
      white-space: nowrap;
    }

    #loading {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 20px;
      background: #000;
      letter-spacing: 1px;
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <div id="loading">正在加载图片与粒子...</div>
  <div id="hint">按下屏幕：聚合成图片 ｜ 松开：散开为粒子</div>
  <div id="canvas-container"></div>

  <script>
    const container = document.getElementById("canvas-container");
    const loadingEl = document.getElementById("loading");

    // =========================
    // 1. Three.js 基础场景
    // =========================
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      75,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.z = 38;

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: true
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    // =========================
    // 2. 参数
    // =========================
    const particleCount = 3200;
    const imagePath = "./ddz.jpg"; // 你的图片路径
    const explodeRange = { x: 100, y: 60, z: 50 };

    let gatherFactor = 0;
    let targetGatherFactor = 0;
    let imageReady = false;

    // =========================
    // 3. 粒子系统
    // =========================
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    const targetPositions = new Float32Array(particleCount * 3);
    const randomPositions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);

    for (let i = 0; i < particleCount; i++) {
      const i3 = i * 3;

      // 散开时的随机位置
      randomPositions[i3]     = (Math.random() - 0.5) * explodeRange.x;
      randomPositions[i3 + 1] = (Math.random() - 0.5) * explodeRange.y;
      randomPositions[i3 + 2] = (Math.random() - 0.5) * explodeRange.z;

      // 初始位置 = 散开状态
      positions[i3]     = randomPositions[i3];
      positions[i3 + 1] = randomPositions[i3 + 1];
      positions[i3 + 2] = randomPositions[i3 + 2];

      // 粒子颜色：偏粉白
      colors[i3]     = 1.0;
      colors[i3 + 1] = 0.45 + Math.random() * 0.25;
      colors[i3 + 2] = 0.75 + Math.random() * 0.2;
    }

    geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));

    const particleMaterial = new THREE.PointsMaterial({
      size: 0.42,
      transparent: true,
      opacity: 0.92,
      vertexColors: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    const particles = new THREE.Points(geometry, particleMaterial);
    scene.add(particles);

    // =========================
    // 4. 图片与发光层
    // =========================
    const textureLoader = new THREE.TextureLoader();

    let imageGroup = null;
    let imageMesh = null;
    let glowMesh = null;

    function createImageMeshes(texture) {
      texture.minFilter = THREE.LinearFilter;
      texture.magFilter = THREE.LinearFilter;
      texture.generateMipmaps = false;

      const aspect = texture.image.width / texture.image.height;

      // 控制图片在场景中的大小
      const imgHeight = 12;
      const imgWidth = imgHeight * aspect;

      const imageGeometry = new THREE.PlaneGeometry(imgWidth, imgHeight);
      const glowGeometry = new THREE.PlaneGeometry(imgWidth * 1.12, imgHeight * 1.12);

      const imageMaterial = new THREE.MeshBasicMaterial({
        map: texture,
        transparent: true,
        opacity: 0,
        depthWrite: false
      });

      const glowMaterial = new THREE.MeshBasicMaterial({
        map: texture,
        transparent: true,
        opacity: 0,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });

      imageMesh = new THREE.Mesh(imageGeometry, imageMaterial);
      glowMesh = new THREE.Mesh(glowGeometry, glowMaterial);

      imageGroup = new THREE.Group();
      imageGroup.add(glowMesh);
      imageGroup.add(imageMesh);
      scene.add(imageGroup);

      return { imgWidth, imgHeight };
    }

    // =========================
    // 5. 从图片透明区域采样粒子目标点
    // =========================
    function fillTargetPositionsFromImage(img, worldWidth, worldHeight) {
      const sampleCanvas = document.createElement("canvas");
      const ctx = sampleCanvas.getContext("2d");

      const maxWidth = 500;
      const scale = Math.min(1, maxWidth / img.width);

      sampleCanvas.width = Math.max(1, Math.floor(img.width * scale));
      sampleCanvas.height = Math.max(1, Math.floor(img.height * scale));

      ctx.clearRect(0, 0, sampleCanvas.width, sampleCanvas.height);
      ctx.drawImage(img, 0, 0, sampleCanvas.width, sampleCanvas.height);

      const width = sampleCanvas.width;
      const height = sampleCanvas.height;
      const imageData = ctx.getImageData(0, 0, width, height).data;

      const points = [];
      const step = 2; // 越小越精细，点越多

      for (let y = 0; y < height; y += step) {
        for (let x = 0; x < width; x += step) {
          const idx = (y * width + x) * 4;
          const alpha = imageData[idx + 3];

          if (alpha > 80) {
            const px = (x / width - 0.5) * worldWidth;
            const py = (0.5 - y / height) * worldHeight;
            const pz = (Math.random() - 0.5) * 1.6;

            points.push({ x: px, y: py, z: pz });
          }
        }
      }

      if (points.length === 0) {
        // 图片没有可采样像素时，全部聚到中心
        for (let i = 0; i < particleCount; i++) {
          const i3 = i * 3;
          targetPositions[i3] = 0;
          targetPositions[i3 + 1] = 0;
          targetPositions[i3 + 2] = 0;
        }
        return;
      }

      for (let i = 0; i < particleCount; i++) {
        const p = points[Math.floor(Math.random() * points.length)];
        const i3 = i * 3;

        targetPositions[i3]     = p.x;
        targetPositions[i3 + 1] = p.y;
        targetPositions[i3 + 2] = p.z;
      }
    }

    // =========================
    // 6. 加载图片
    // =========================
    textureLoader.load(
      imagePath,
      (texture) => {
        const sizeInfo = createImageMeshes(texture);
        fillTargetPositionsFromImage(texture.image, sizeInfo.imgWidth, sizeInfo.imgHeight);

        imageReady = true;
        loadingEl.style.display = "none";
        animate();
      },
      undefined,
      () => {
        loadingEl.innerHTML = "图片加载失败，请确认 ddz.png 路径是否正确";
      }
    );

    // =========================
    // 7. 按下聚合 / 松开散开
    // =========================
    function pressStart() {
      targetGatherFactor = 1;
    }

    function pressEnd() {
      targetGatherFactor = 0;
    }

    window.addEventListener("mousedown", pressStart);
    window.addEventListener("mouseup", pressEnd);
    window.addEventListener("mouseleave", pressEnd);

    window.addEventListener("touchstart", pressStart, { passive: true });
    window.addEventListener("touchend", pressEnd, { passive: true });
    window.addEventListener("touchcancel", pressEnd, { passive: true });

    // =========================
    // 8. 动画循环
    // =========================
    function animate() {
      requestAnimationFrame(animate);

      if (!imageReady) return;

      // 聚合平滑
      gatherFactor += (targetGatherFactor - gatherFactor) * 0.06;

      // 粒子淡出，图片淡入
      particleMaterial.opacity = 0.92 - gatherFactor * 0.82;

      if (imageMesh && glowMesh) {
        imageMesh.material.opacity = Math.max(0, gatherFactor - 0.15) * 1.2;
        glowMesh.material.opacity = Math.max(0, gatherFactor - 0.05) * 0.95;
      }

      // 旋转速度
      particles.rotation.y += 0.01;
      if (imageGroup) {
        imageGroup.rotation.y += 0.004;
      }

      const posAttr = geometry.attributes.position;
      const currentPositions = posAttr.array;

      for (let i = 0; i < particleCount; i++) {
        const i3 = i * 3;

        const tx = randomPositions[i3] +
          (targetPositions[i3] - randomPositions[i3]) * gatherFactor;
        const ty = randomPositions[i3 + 1] +
          (targetPositions[i3 + 1] - randomPositions[i3 + 1]) * gatherFactor;
        const tz = randomPositions[i3 + 2] +
          (targetPositions[i3 + 2] - randomPositions[i3 + 2]) * gatherFactor;

        currentPositions[i3]     += (tx - currentPositions[i3]) * 0.08;
        currentPositions[i3 + 1] += (ty - currentPositions[i3 + 1]) * 0.08;
        currentPositions[i3 + 2] += (tz - currentPositions[i3 + 2]) * 0.08;
      }

      posAttr.needsUpdate = true;
      renderer.render(scene, camera);
    }

    // =========================
    // 9. 自适应
    // =========================
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
