<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dingdonglove</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    #hint {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.9);
      font-family: Arial, "Microsoft YaHei", sans-serif;
      font-size: 16px;
      letter-spacing: 1px;
      z-index: 10;
      pointer-events: none;
      text-align: center;
      line-height: 1.8;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(6px);
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <div id="hint">按下屏幕：聚合 ｜ 松开：散开</div>
  <div id="canvas-container"></div>

  <script>
    // 1. Three.js 场景初始化
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      75,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.z = 38;

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: true
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById("canvas-container").appendChild(renderer.domElement);

    // 2. 创建 DDZ 粒子系统
    const particleCount = 3000;
    const geometry = new THREE.BufferGeometry();

    const positions = new Float32Array(particleCount * 3);
    const targetPositions = new Float32Array(particleCount * 3);
    const randomPositions = new Float32Array(particleCount * 3);

    const DISPLAY_TEXT = "“我爱你的下巴”
                        “我爱你耳朵上的痣”";

    function getTextPoints(text) {
      const canvas = document.createElement("canvas");
      canvas.width = 1400;
      canvas.height = 420;
      const ctx = canvas.getContext("2d");

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "bold 260px Arial Black, Arial, sans-serif";
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
      const points = [];
      const step = 3;

      for (let y = 0; y < canvas.height; y += step) {
        for (let x = 0; x < canvas.width; x += step) {
          const index = (y * canvas.width + x) * 4;
          const alpha = imageData[index + 3];

          if (alpha > 128) {
            const px = (x - canvas.width / 2) * 0.045;
            const py = (canvas.height / 2 - y) * 0.045;
            points.push({ x: px, y: py });
          }
        }
      }

      return points;
    }

    const textPoints = getTextPoints(DISPLAY_TEXT);

    for (let i = 0; i < particleCount; i++) {
      const p = textPoints[Math.floor(Math.random() * textPoints.length)];

      targetPositions[i * 3] = p.x;
      targetPositions[i * 3 + 1] = p.y;
      targetPositions[i * 3 + 2] = (Math.random() - 0.5) * 2.5;

      randomPositions[i * 3] = (Math.random() - 0.5) * 100;
      randomPositions[i * 3 + 1] = (Math.random() - 0.5) * 60;
      randomPositions[i * 3 + 2] = (Math.random() - 0.5) * 50;

      positions[i * 3] = randomPositions[i * 3];
      positions[i * 3 + 1] = randomPositions[i * 3 + 1];
      positions[i * 3 + 2] = randomPositions[i * 3 + 2];
    }

    geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));

    const material = new THREE.PointsMaterial({
      color: 0xff69b4,
      size: 0.42,
      transparent: true,
      opacity: 0.86,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    // 3. 按下聚合 / 松开散开
    let gatherFactor = 0;
    let targetGatherFactor = 0;

    function pressStart() {
      targetGatherFactor = 1;
    }

    function pressEnd() {
      targetGatherFactor = 0;
    }

    window.addEventListener("mousedown", pressStart);
    window.addEventListener("mouseup", pressEnd);
    window.addEventListener("mouseleave", pressEnd);

    window.addEventListener("touchstart", pressStart, { passive: true });
    window.addEventListener("touchend", pressEnd, { passive: true });
    window.addEventListener("touchcancel", pressEnd, { passive: true });

    // 4. 动画循环
    function animate() {
      requestAnimationFrame(animate);

      // 原来是 0.002，这里加快
      particles.rotation.y += 0.008;

      gatherFactor += (targetGatherFactor - gatherFactor) * 0.05;

      const posAttr = particles.geometry.attributes.position;
      const currentPositions = posAttr.array;

      for (let i = 0; i < particleCount; i++) {
        const idx = i * 3;

        const tx =
          randomPositions[idx] +
          (targetPositions[idx] - randomPositions[idx]) * gatherFactor;
        const ty =
          randomPositions[idx + 1] +
          (targetPositions[idx + 1] - randomPositions[idx + 1]) * gatherFactor;
        const tz =
          randomPositions[idx + 2] +
          (targetPositions[idx + 2] - randomPositions[idx + 2]) * gatherFactor;

        currentPositions[idx] += (tx - currentPositions[idx]) * 0.1;
        currentPositions[idx + 1] += (ty - currentPositions[idx + 1]) * 0.1;
        currentPositions[idx + 2] += (tz - currentPositions[idx + 2]) * 0.1;
      }

      posAttr.needsUpdate = true;
      renderer.render(scene, camera);
    }

    animate();

    // 5. 自适应窗口
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
