<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebGL 手势控制 DDZ 粒子</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    /* 隐藏摄像头视频流，只用于后台分析 */
    .input_video {
      display: none;
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-family: sans-serif;
      font-size: 24px;
      text-align: center;
      pointer-events: none;
      z-index: 10;
      line-height: 1.6;
    }
  </style>

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- MediaPipe Hands -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="loading">正在加载模型与摄像头...<br />请允许摄像头权限</div>
  <div id="canvas-container"></div>
  <video class="input_video"></video>

  <script>
    // =========================
    // 1. Three.js 场景初始化
    // =========================
    const scene = new THREE.Scene();

    const threeCamera = new THREE.PerspectiveCamera(
      75,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    threeCamera.position.z = 38;

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: true
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById("canvas-container").appendChild(renderer.domElement);

    // =========================
    // 2. 创建 DDZ 粒子系统
    // =========================
    const particleCount = 3000;
    const geometry = new THREE.BufferGeometry();

    const positions = new Float32Array(particleCount * 3);
    const targetPositions = new Float32Array(particleCount * 3);
    const randomPositions = new Float32Array(particleCount * 3);

    // 你以后只改这里，就能把 DDZ 换成别的字
    const DISPLAY_TEXT = "“我爱你的下巴”“我爱你耳朵上的痣”";

    // 用隐藏 canvas 生成文字像素点
    function getTextPoints(text) {
      const canvas = document.createElement("canvas");
      canvas.width = 1400;
      canvas.height = 420;

      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "bold 260px Arial Black, Arial, sans-serif";
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
      const points = [];

      // 采样步长：越小越精细，点越多
      const step = 3;

      for (let y = 0; y < canvas.height; y += step) {
        for (let x = 0; x < canvas.width; x += step) {
          const index = (y * canvas.width + x) * 4;
          const alpha = imageData[index + 3];

          if (alpha > 128) {
            const px = (x - canvas.width / 2) * 0.045;
            const py = (canvas.height / 2 - y) * 0.045;
            points.push({ x: px, y: py });
          }
        }
      }

      return points;
    }

    const textPoints = getTextPoints(DISPLAY_TEXT);

    // 把粒子目标点设为 DDZ 文字区域
    for (let i = 0; i < particleCount; i++) {
      const p = textPoints[Math.floor(Math.random() * textPoints.length)];

      // 聚合后的目标位置（DDZ）
      targetPositions[i * 3] = p.x;
      targetPositions[i * 3 + 1] = p.y;
      targetPositions[i * 3 + 2] = (Math.random() - 0.5) * 2.5; // 稍微给一点厚度

      // 散开时的随机位置
      randomPositions[i * 3] = (Math.random() - 0.5) * 100;
      randomPositions[i * 3 + 1] = (Math.random() - 0.5) * 60;
      randomPositions[i * 3 + 2] = (Math.random() - 0.5) * 50;

      // 初始状态：散开
      positions[i * 3] = randomPositions[i * 3];
      positions[i * 3 + 1] = randomPositions[i * 3 + 1];
      positions[i * 3 + 2] = randomPositions[i * 3 + 2];
    }

    geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));

    const material = new THREE.PointsMaterial({
      color: 0xff69b4,
      size: 0.4,
      transparent: true,
      opacity: 0.85,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    // =========================
    // 3. 交互逻辑变量
    // =========================
    let gatherFactor = 0;       // 0 = 完全散开, 1 = 完全聚合成 DDZ
    let targetGatherFactor = 0; // 目标聚合度，由手势控制

    // =========================
    // 4. MediaPipe Hands 配置
    // =========================
    const videoElement = document.getElementsByClassName("input_video")[0];
    const loadingEl = document.getElementById("loading");

    function onResults(results) {
      loadingEl.style.display = "none";

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];

        // 计算手掌开合程度
        // 用拇指和四指指尖到手腕的平均距离作为依据
        const wrist = landmarks[0];
        const fingerTips = [4, 8, 12, 16, 20];
        let totalDist = 0;

        fingerTips.forEach((idx) => {
          const tip = landmarks[idx];
          const dist = Math.sqrt(
            Math.pow(tip.x - wrist.x, 2) +
            Math.pow(tip.y - wrist.y, 2)
          );
          totalDist += dist;
        });

        const avgDist = totalDist / fingerTips.length;

        // 阈值可按实际摄像头效果微调
        const closeThreshold = 0.25;
        const openThreshold = 0.5;

        let normalized =
          (avgDist - closeThreshold) / (openThreshold - closeThreshold);

        normalized = 1 - Math.min(Math.max(normalized, 0), 1);

        // 握拳 -> 聚合成 DDZ；张开 -> 散开
        targetGatherFactor = normalized;
      } else {
        // 没检测到手时，默认散开
        targetGatherFactor = 0;
      }
    }

    const hands = new Hands({
      locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
      }
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    hands.onResults(onResults);

    const mpCamera = new Camera(videoElement, {
      onFrame: async () => {
        await hands.send({ image: videoElement });
      },
      width: 640,
      height: 480
    });

    mpCamera.start();

    // =========================
    // 5. 动画循环
    // =========================
    function animate() {
      requestAnimationFrame(animate);

      // 轻微旋转，让粒子更灵动
      particles.rotation.y += 0.002;

      // 平滑过渡聚合系数
      gatherFactor += (targetGatherFactor - gatherFactor) * 0.05;

      const posAttr = particles.geometry.attributes.position;
      const currentPositions = posAttr.array;

      for (let i = 0; i < particleCount; i++) {
        const idx = i * 3;

        // 在随机散开位置 与 DDZ 目标位置之间插值
        const tx =
          randomPositions[idx] +
          (targetPositions[idx] - randomPositions[idx]) * gatherFactor;
        const ty =
          randomPositions[idx + 1] +
          (targetPositions[idx + 1] - randomPositions[idx + 1]) * gatherFactor;
        const tz =
          randomPositions[idx + 2] +
          (targetPositions[idx + 2] - randomPositions[idx + 2]) * gatherFactor;

        // 平滑移动
        currentPositions[idx] += (tx - currentPositions[idx]) * 0.1;
        currentPositions[idx + 1] += (ty - currentPositions[idx + 1]) * 0.1;
        currentPositions[idx + 2] += (tz - currentPositions[idx + 2]) * 0.1;
      }

      posAttr.needsUpdate = true;
      renderer.render(scene, threeCamera);
    }

    animate();

    // =========================
    // 6. 窗口大小自适应
    // =========================
    window.addEventListener("resize", () => {
      threeCamera.aspect = window.innerWidth / window.innerHeight;
      threeCamera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
