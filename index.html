<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>粒子聚合为照片 / 立方体</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      font-family: Arial, "Microsoft YaHei", sans-serif;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    #hint {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: rgba(255,255,255,0.92);
      font-size: 15px;
      letter-spacing: 1px;
      text-align: center;
      line-height: 1.8;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(6px);
      pointer-events: none;
      white-space: nowrap;
    }

    #loading {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 20px;
      background: #000;
      letter-spacing: 1px;
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <div id="loading">正在加载图片与粒子...</div>
  <div id="hint">按下：聚合 ｜ 松开：散开</div>
  <div id="canvas-container"></div>

  <script>
    // =========================
    // 可调参数
    // =========================

    // "plane" = 粒子聚合为一张照片
    // "cube"  = 粒子聚合为一个立方体，前后两面是照片
    const SHAPE_MODE = "cube";

    // 图片路径：png / jpg 都可以
    const IMAGE_PATH = "./ddz.jpg";

    const PARTICLE_COUNT = 5000;
    const ROTATE_SPEED_Y = 0.012;  // 旋转更快一点
    const ROTATE_SPEED_X = 0.003;

    const SCATTER_RANGE = { x: 130, y: 90, z: 70 };

    // plane 模式参数
    const PLANE_HEIGHT = 18;

    // cube 模式参数
    const CUBE_SIZE = 18;

    // =========================
    // 基础场景
    // =========================
    const container = document.getElementById("canvas-container");
    const loadingEl = document.getElementById("loading");

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.z = 42;

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: true
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    // =========================
    // 粒子贴图：让粒子看起来像发光圆点
    // =========================
    function createParticleSprite() {
      const size = 128;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");

      const gradient = ctx.createRadialGradient(
        size / 2, size / 2, 0,
        size / 2, size / 2, size / 2
      );
      gradient.addColorStop(0.0, "rgba(255,255,255,1)");
      gradient.addColorStop(0.2, "rgba(255,255,255,0.95)");
      gradient.addColorStop(0.5, "rgba(255,255,255,0.45)");
      gradient.addColorStop(1.0, "rgba(255,255,255,0)");

      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      return texture;
    }

    const particleSprite = createParticleSprite();

    // =========================
    // 粒子数据
    // =========================
    const geometry = new THREE.BufferGeometry();

    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const colors = new Float32Array(PARTICLE_COUNT * 3);

    const randomPositions = new Float32Array(PARTICLE_COUNT * 3);
    const targetPositions = new Float32Array(PARTICLE_COUNT * 3);

    const scatterColors = new Float32Array(PARTICLE_COUNT * 3);
    const targetColors = new Float32Array(PARTICLE_COUNT * 3);

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const i3 = i * 3;

      randomPositions[i3]     = (Math.random() - 0.5) * SCATTER_RANGE.x;
      randomPositions[i3 + 1] = (Math.random() - 0.5) * SCATTER_RANGE.y;
      randomPositions[i3 + 2] = (Math.random() - 0.5) * SCATTER_RANGE.z;

      positions[i3]     = randomPositions[i3];
      positions[i3 + 1] = randomPositions[i3 + 1];
      positions[i3 + 2] = randomPositions[i3 + 2];

      // 散开时颜色：粉白
      scatterColors[i3]     = 1.0;
      scatterColors[i3 + 1] = 0.55 + Math.random() * 0.20;
      scatterColors[i3 + 2] = 0.75 + Math.random() * 0.20;

      colors[i3]     = scatterColors[i3];
      colors[i3 + 1] = scatterColors[i3 + 1];
      colors[i3 + 2] = scatterColors[i3 + 2];
    }

    geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
      size: 0.65,
      map: particleSprite,
      transparent: true,
      opacity: 0.95,
      vertexColors: true,
      depthWrite: false,
      blending: THREE.NormalBlending
    });

    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    // =========================
    // 状态变量
    // =========================
    let gatherFactor = 0;
    let targetGatherFactor = 0;
    let ready = false;

    // =========================
    // 图片加载
    // =========================
    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    function buildImageData(img, maxWidth = 500) {
      const scale = Math.min(1, maxWidth / img.width);
      const canvas = document.createElement("canvas");
      canvas.width = Math.max(1, Math.floor(img.width * scale));
      canvas.height = Math.max(1, Math.floor(img.height * scale));

      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      return {
        width: canvas.width,
        height: canvas.height,
        data: imageData.data
      };
    }

    function sampleColor(imgData, u, v) {
      u = Math.min(1, Math.max(0, u));
      v = Math.min(1, Math.max(0, v));

      const x = Math.min(imgData.width - 1, Math.floor(u * (imgData.width - 1)));
      const y = Math.min(imgData.height - 1, Math.floor(v * (imgData.height - 1)));
      const idx = (y * imgData.width + x) * 4;

      return {
        r: imgData.data[idx] / 255,
        g: imgData.data[idx + 1] / 255,
        b: imgData.data[idx + 2] / 255,
        a: imgData.data[idx + 3] / 255
      };
    }

    function buildPlaneTargets(imgData) {
      const aspect = imgData.width / imgData.height;
      const planeHeight = PLANE_HEIGHT;
      const planeWidth = planeHeight * aspect;

      const candidates = [];
      const step = 2;

      for (let y = 0; y < imgData.height; y += step) {
        for (let x = 0; x < imgData.width; x += step) {
          const idx = (y * imgData.width + x) * 4;
          const r = imgData.data[idx];
          const g = imgData.data[idx + 1];
          const b = imgData.data[idx + 2];
          const a = imgData.data[idx + 3];

          // PNG 透明背景可自动抠掉；JPG 因为本身不透明，会形成整张照片
          if (a > 20) {
            const px = (x / imgData.width - 0.5) * planeWidth;
            const py = (0.5 - y / imgData.height) * planeHeight;
            const pz = (Math.random() - 0.5) * 0.8;

            candidates.push({
              x: px,
              y: py,
              z: pz,
              r: r / 255,
              g: g / 255,
              b: b / 255
            });
          }
        }
      }

      if (candidates.length === 0) {
        for (let i = 0; i < PARTICLE_COUNT; i++) {
          const i3 = i * 3;
          targetPositions[i3] = 0;
          targetPositions[i3 + 1] = 0;
          targetPositions[i3 + 2] = 0;

          targetColors[i3] = 1;
          targetColors[i3 + 1] = 1;
          targetColors[i3 + 2] = 1;
        }
        return;
      }

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const i3 = i * 3;
        const p = candidates[Math.floor(Math.random() * candidates.length)];

        targetPositions[i3]     = p.x;
        targetPositions[i3 + 1] = p.y;
        targetPositions[i3 + 2] = p.z;

        targetColors[i3]     = p.r;
        targetColors[i3 + 1] = p.g;
        targetColors[i3 + 2] = p.b;
      }
    }

    function buildCubeTargets(imgData) {
      const half = CUBE_SIZE / 2;

      // 侧面颜色：淡粉白
      const sideBase = { r: 1.0, g: 0.82, b: 0.92 };

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const i3 = i * 3;
        const rnd = Math.random();

        let x, y, z, c;

        // 前面 32%，后面 32%，其余四个侧面各 9%
        if (rnd < 0.32) {
          // 前面：照片
          x = (Math.random() - 0.5) * CUBE_SIZE;
          y = (Math.random() - 0.5) * CUBE_SIZE;
          z = half;

          const u = (x + half) / CUBE_SIZE;
          const v = 1 - (y + half) / CUBE_SIZE;
          c = sampleColor(imgData, u, v);
        } else if (rnd < 0.64) {
          // 后面：照片
          x = (Math.random() - 0.5) * CUBE_SIZE;
          y = (Math.random() - 0.5) * CUBE_SIZE;
          z = -half;

          // 这里做个镜像，让背面朝外看时更自然
          const u = 1 - (x + half) / CUBE_SIZE;
          const v = 1 - (y + half) / CUBE_SIZE;
          c = sampleColor(imgData, u, v);
        } else if (rnd < 0.73) {
          // 左面
          x = -half;
          y = (Math.random() - 0.5) * CUBE_SIZE;
          z = (Math.random() - 0.5) * CUBE_SIZE;
          c = sideBase;
        } else if (rnd < 0.82) {
          // 右面
          x = half;
          y = (Math.random() - 0.5) * CUBE_SIZE;
          z = (Math.random() - 0.5) * CUBE_SIZE;
          c = sideBase;
        } else if (rnd < 0.91) {
          // 上面
          x = (Math.random() - 0.5) * CUBE_SIZE;
          y = half;
          z = (Math.random() - 0.5) * CUBE_SIZE;
          c = sideBase;
        } else {
          // 下面
          x = (Math.random() - 0.5) * CUBE_SIZE;
          y = -half;
          z = (Math.random() - 0.5) * CUBE_SIZE;
          c = sideBase;
        }

        targetPositions[i3]     = x;
        targetPositions[i3 + 1] = y;
        targetPositions[i3 + 2] = z;

        targetColors[i3]     = c.r;
        targetColors[i3 + 1] = c.g;
        targetColors[i3 + 2] = c.b;
      }
    }

    async function initTargets() {
      try {
        const img = await loadImage(IMAGE_PATH);
        const imgData = buildImageData(img);

        if (SHAPE_MODE === "plane") {
          buildPlaneTargets(imgData);
        } else {
          buildCubeTargets(imgData);
        }

        ready = true;
        loadingEl.style.display = "none";
        animate();
      } catch (e) {
        loadingEl.innerHTML = "图片加载失败，请检查路径：" + IMAGE_PATH;
        console.error(e);
      }
    }

    initTargets();

    // =========================
    // 按下聚合 / 松开散开
    // =========================
    function pressStart() {
      targetGatherFactor = 1;
    }

    function pressEnd() {
      targetGatherFactor = 0;
    }

    window.addEventListener("mousedown", pressStart);
    window.addEventListener("mouseup", pressEnd);
    window.addEventListener("mouseleave", pressEnd);

    window.addEventListener("touchstart", pressStart, { passive: true });
    window.addEventListener("touchend", pressEnd, { passive: true });
    window.addEventListener("touchcancel", pressEnd, { passive: true });

    // =========================
    // 动画
    // =========================
    function animate() {
      requestAnimationFrame(animate);
      if (!ready) return;

      gatherFactor += (targetGatherFactor - gatherFactor) * 0.06;

      particles.rotation.y += ROTATE_SPEED_Y;
      particles.rotation.x += ROTATE_SPEED_X;

      const posAttr = geometry.attributes.position;
      const colorAttr = geometry.attributes.color;

      const posArray = posAttr.array;
      const colorArray = colorAttr.array;

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const i3 = i * 3;

        const tx = randomPositions[i3] +
          (targetPositions[i3] - randomPositions[i3]) * gatherFactor;
        const ty = randomPositions[i3 + 1] +
          (targetPositions[i3 + 1] - randomPositions[i3 + 1]) * gatherFactor;
        const tz = randomPositions[i3 + 2] +
          (targetPositions[i3 + 2] - randomPositions[i3 + 2]) * gatherFactor;

        posArray[i3]     += (tx - posArray[i3]) * 0.10;
        posArray[i3 + 1] += (ty - posArray[i3 + 1]) * 0.10;
        posArray[i3 + 2] += (tz - posArray[i3 + 2]) * 0.10;

        const tr = scatterColors[i3] +
          (targetColors[i3] - scatterColors[i3]) * gatherFactor;
        const tg = scatterColors[i3 + 1] +
          (targetColors[i3 + 1] - scatterColors[i3 + 1]) * gatherFactor;
        const tb = scatterColors[i3 + 2] +
          (targetColors[i3 + 2] - scatterColors[i3 + 2]) * gatherFactor;

        colorArray[i3]     += (tr - colorArray[i3]) * 0.12;
        colorArray[i3 + 1] += (tg - colorArray[i3 + 1]) * 0.12;
        colorArray[i3 + 2] += (tb - colorArray[i3 + 2]) * 0.12;
      }

      posAttr.needsUpdate = true;
      colorAttr.needsUpdate = true;

      renderer.render(scene, camera);
    }

    // =========================
    // 自适应
    // =========================
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
