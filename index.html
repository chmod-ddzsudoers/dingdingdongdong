<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>粒子聚合为四面图片立方体</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      font-family: Arial, "Microsoft YaHei", sans-serif;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    #hint {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: rgba(255,255,255,0.92);
      font-size: 15px;
      letter-spacing: 1px;
      text-align: center;
      line-height: 1.8;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(6px);
      pointer-events: none;
      white-space: nowrap;
    }

    #loading {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 20px;
      background: #000;
      letter-spacing: 1px;
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <div id="loading">正在加载图片与粒子...</div>
  <div id="hint">按下：聚合成立方体 ｜ 松开：散开为粒子</div>
  <div id="canvas-container"></div>

  <script>
    // =========================
    // 可调参数
    // =========================
    const IMAGE_PATH = "./ddz.jpg";   // 改成你的图片路径，比如 ./ddz.jpg
    const PARTICLE_COUNT = 24000;     // 粒子数量，已经明显提高
    const SAMPLE_STEP = 2;            // 图片采样步长，越小越清晰，但更吃性能
    const IMAGE_MAX_SIZE = 180;       // 采样分辨率，越大越清晰
    const CUBE_SIZE = 18;             // 立方体大小
 
    const ROTATE_SPEED_Y = 0.012;      //绕着y轴转
    #const ROTATE_SPEED_X = 0.003;     //绕着x轴转

    const SCATTER_RANGE = { x: 130, y: 90, z: 70 };

    // =========================
    // 基础场景
    // =========================
    const container = document.getElementById("canvas-container");
    const loadingEl = document.getElementById("loading");

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.z = 42;

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: true
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    // =========================
    // 发光粒子贴图
    // =========================
    function createParticleSprite() {
      const size = 128;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");

      const gradient = ctx.createRadialGradient(
        size / 2, size / 2, 0,
        size / 2, size / 2, size / 2
      );
      gradient.addColorStop(0.0, "rgba(255,255,255,1)");
      gradient.addColorStop(0.18, "rgba(255,255,255,0.95)");
      gradient.addColorStop(0.45, "rgba(255,255,255,0.55)");
      gradient.addColorStop(1.0, "rgba(255,255,255,0)");

      ctx.clearRect(0, 0, size, size);
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      return texture;
    }

    const particleSprite = createParticleSprite();

    // =========================
    // 粒子数据
    // =========================
    const geometry = new THREE.BufferGeometry();

    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const colors = new Float32Array(PARTICLE_COUNT * 3);

    const randomPositions = new Float32Array(PARTICLE_COUNT * 3);
    const targetPositions = new Float32Array(PARTICLE_COUNT * 3);

    const scatterColors = new Float32Array(PARTICLE_COUNT * 3);
    const targetColors = new Float32Array(PARTICLE_COUNT * 3);

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const i3 = i * 3;

      randomPositions[i3] = (Math.random() - 0.5) * SCATTER_RANGE.x;
      randomPositions[i3 + 1] = (Math.random() - 0.5) * SCATTER_RANGE.y;
      randomPositions[i3 + 2] = (Math.random() - 0.5) * SCATTER_RANGE.z;

      positions[i3] = randomPositions[i3];
      positions[i3 + 1] = randomPositions[i3 + 1];
      positions[i3 + 2] = randomPositions[i3 + 2];

      // 散开时颜色：粉白
      scatterColors[i3] = 1.0;
      scatterColors[i3 + 1] = 0.58 + Math.random() * 0.18;
      scatterColors[i3 + 2] = 0.78 + Math.random() * 0.18;

      colors[i3] = scatterColors[i3];
      colors[i3 + 1] = scatterColors[i3 + 1];
      colors[i3 + 2] = scatterColors[i3 + 2];
    }

    geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
      size: 0.34,
      map: particleSprite,
      transparent: true,
      opacity: 0.96,
      vertexColors: true,
      depthWrite: false,
      blending: THREE.NormalBlending
    });

    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    // =========================
    // 状态变量
    // =========================
    let gatherFactor = 0;
    let targetGatherFactor = 0;
    let ready = false;

    // =========================
    // 加载图片
    // =========================
    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    function buildImageData(img) {
      const scale = Math.min(1, IMAGE_MAX_SIZE / img.width);
      const canvas = document.createElement("canvas");
      canvas.width = Math.max(1, Math.floor(img.width * scale));
      canvas.height = Math.max(1, Math.floor(img.height * scale));

      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      return {
        width: canvas.width,
        height: canvas.height,
        data: imageData.data
      };
    }

    // =========================
    // 构建四个侧面的图片粒子目标点
    // 前 / 后 / 左 / 右 四面都是图片
    // =========================
    function buildCubeImageCandidates(imgData) {
      const candidates = [];
      const half = CUBE_SIZE / 2;

      // 保持图片比例，放进正方形侧面里
      const aspect = imgData.width / imgData.height;
      let drawW, drawH;

      if (aspect >= 1) {
        drawW = CUBE_SIZE;
        drawH = CUBE_SIZE / aspect;
      } else {
        drawH = CUBE_SIZE;
        drawW = CUBE_SIZE * aspect;
      }

      for (let y = 0; y < imgData.height; y += SAMPLE_STEP) {
        for (let x = 0; x < imgData.width; x += SAMPLE_STEP) {
          const idx = (y * imgData.width + x) * 4;
          const r = imgData.data[idx] / 255;
          const g = imgData.data[idx + 1] / 255;
          const b = imgData.data[idx + 2] / 255;
          const a = imgData.data[idx + 3];

          // PNG 透明背景时，透明像素不参与
          if (a < 20) continue;

          const localX = (x / (imgData.width - 1) - 0.5) * drawW;
          const localY = (0.5 - y / (imgData.height - 1)) * drawH;

          // 前面
          candidates.push({
            x: localX,
            y: localY,
            z: half,
            r, g, b
          });

          // 后面（镜像一下，外侧看方向更自然）
          candidates.push({
            x: -localX,
            y: localY,
            z: -half,
            r, g, b
          });

          // 左面
          candidates.push({
            x: -half,
            y: localY,
            z: -localX,
            r, g, b
          });

          // 右面
          candidates.push({
            x: half,
            y: localY,
            z: localX,
            r, g, b
          });
        }
      }

      return candidates;
    }

    // =========================
    // 把候选点分配给粒子
    // =========================
    function fillTargetsFromCandidates(candidates) {
      if (!candidates.length) {
        for (let i = 0; i < PARTICLE_COUNT; i++) {
          const i3 = i * 3;
          targetPositions[i3] = 0;
          targetPositions[i3 + 1] = 0;
          targetPositions[i3 + 2] = 0;
          targetColors[i3] = 1;
          targetColors[i3 + 1] = 1;
          targetColors[i3 + 2] = 1;
        }
        return;
      }

      // 为了分布更均匀，不是纯随机，而是按比例抽样
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const i3 = i * 3;
        const idx = Math.floor(i * candidates.length / PARTICLE_COUNT);
        const p = candidates[idx];

        targetPositions[i3] = p.x;
        targetPositions[i3 + 1] = p.y;
        targetPositions[i3 + 2] = p.z;

        targetColors[i3] = p.r;
        targetColors[i3 + 1] = p.g;
        targetColors[i3 + 2] = p.b;
      }
    }

    async function initTargets() {
      try {
        const img = await loadImage(IMAGE_PATH);
        const imgData = buildImageData(img);
        const candidates = buildCubeImageCandidates(imgData);
        fillTargetsFromCandidates(candidates);

        ready = true;
        loadingEl.style.display = "none";
        animate();
      } catch (e) {
        loadingEl.innerHTML = "图片加载失败，请检查路径：" + IMAGE_PATH;
        console.error(e);
      }
    }

    initTargets();

    // =========================
    // 按下聚合 / 松开散开
    // =========================
    function pressStart() {
      targetGatherFactor = 1;
    }

    function pressEnd() {
      targetGatherFactor = 0;
    }

    window.addEventListener("mousedown", pressStart);
    window.addEventListener("mouseup", pressEnd);
    window.addEventListener("mouseleave", pressEnd);

    window.addEventListener("touchstart", pressStart, { passive: true });
    window.addEventListener("touchend", pressEnd, { passive: true });
    window.addEventListener("touchcancel", pressEnd, { passive: true });

    // =========================
    // 动画
    // =========================
    function animate() {
      requestAnimationFrame(animate);
      if (!ready) return;

      gatherFactor += (targetGatherFactor - gatherFactor) * 0.06;

      // 聚合时稍微把粒子缩小一点，图片更清楚
      material.size = 0.44 - gatherFactor * 0.16;

      particles.rotation.y += ROTATE_SPEED_Y;
      particles.rotation.x += ROTATE_SPEED_X;

      const posAttr = geometry.attributes.position;
      const colorAttr = geometry.attributes.color;

      const posArray = posAttr.array;
      const colorArray = colorAttr.array;

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const i3 = i * 3;

        const tx = randomPositions[i3] +
          (targetPositions[i3] - randomPositions[i3]) * gatherFactor;
        const ty = randomPositions[i3 + 1] +
          (targetPositions[i3 + 1] - randomPositions[i3 + 1]) * gatherFactor;
        const tz = randomPositions[i3 + 2] +
          (targetPositions[i3 + 2] - randomPositions[i3 + 2]) * gatherFactor;

        posArray[i3] += (tx - posArray[i3]) * 0.10;
        posArray[i3 + 1] += (ty - posArray[i3 + 1]) * 0.10;
        posArray[i3 + 2] += (tz - posArray[i3 + 2]) * 0.10;

        const tr = scatterColors[i3] +
          (targetColors[i3] - scatterColors[i3]) * gatherFactor;
        const tg = scatterColors[i3 + 1] +
          (targetColors[i3 + 1] - scatterColors[i3 + 1]) * gatherFactor;
        const tb = scatterColors[i3 + 2] +
          (targetColors[i3 + 2] - scatterColors[i3 + 2]) * gatherFactor;

        colorArray[i3] += (tr - colorArray[i3]) * 0.12;
        colorArray[i3 + 1] += (tg - colorArray[i3 + 1]) * 0.12;
        colorArray[i3 + 2] += (tb - colorArray[i3 + 2]) * 0.12;
      }

      posAttr.needsUpdate = true;
      colorAttr.needsUpdate = true;

      renderer.render(scene, camera);
    }

    // =========================
    // 自适应
    // =========================
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
